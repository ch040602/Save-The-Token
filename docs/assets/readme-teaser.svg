  <title id="title">Save-The-Token README teaser</title>
  <desc id="desc">Local-first context slimming with strict sufficiency gates for MCP-heavy agent setups. Key metrics: Weighted saving 69.3%, Median saving 63.5%, Eligible success 100%, Best case 88.3%. Pipeline: scan -&gt; measure -&gt; route -&gt; digest -&gt; compress -&gt; judge -&gt; emit.</desc>
