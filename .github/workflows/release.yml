name: Release Gate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  release-gate:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and release tools
        run: python -m pip install -e ".[dev]"

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: Ruff lint
        run: python -m ruff check ./src ./tests

      - name: Ruff format check
        run: python -m ruff format --check ./src ./tests

      - name: Mypy
        run: mypy ./src/save_the_token

      - name: Compile source
        run: python -m compileall -q src/save_the_token

      - name: Build distributions
        run: python -m build --sdist --wheel --outdir dist

      - name: Twine metadata check
        run: python -m twine check dist/*

      - name: Install wheel and smoke CLI
        run: |
          python -m venv .release-smoke-venv
          . .release-smoke-venv/bin/activate
          python -m pip install --no-index --find-links dist save-the-token
          save-the-token --help

      - name: Tiny benchmark smoke
        run: |
          save-the-token benchmark \
            --repos-dir tests/fixtures/benchmark-smoke/repos \
            --repo-commits tests/fixtures/benchmark-smoke/repo-commits.json \
            --task "unit tests" \
            --json-out benchmark-smoke.json \
            --markdown-out benchmark-smoke.md

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-smoke-${{ matrix.python-version }}
          path: |
            benchmark-smoke.json
            benchmark-smoke.md
